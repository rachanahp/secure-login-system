<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Secure Login System</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        a.logout { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ef4444; color: white; text-decoration: none; border-radius: 5px; }
        a.logout:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome, {{ username }}!</h2>
        <p>You have successfully logged in to the Secure Login System.</p>
        <a class="logout" href="{{ url_for('logout') }}">Logout</a>
    </div>
</body>
</html>
